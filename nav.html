<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exploración Virtual</title>

<style>

html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:red;
    cursor:grab;
}
    
#container{
    width:100vw;
    height:100vh;
    overflow:hidden;
    position:relative;
    background:black;
}

video{
    position:absolute;

    width:120vw;
    height:100vh;

    top:0;
    left:-10vw;

    object-fit:cover;

    will-change:transform;

    pointer-events:none;
}

#hud{
    position:fixed;
    top:20px;
    left:20px;

    color:white;
    font-family:Arial;

    background:rgba(0,0,0,0.5);

    padding:12px;
    border-radius:12px;

    z-index:999;
}

</style>
</head>
<body>

<div id="container">

    <video
        id="video"
        src="explorar.m4v"
        preload="auto"
        muted
        playsinline
       
    ></video>

</div>

<div id="hud">
    Scroll = avanzar<br>
    Mouse = mirar lados
</div>

<script>

const video = document.getElementById("video");

let targetTime = 0;

let targetLookX = 0;
let currentLookX = 0;

const MAX_LOOK = 140;

let ready = false;



/* =========================
   VIDEO READY
========================= */

video.addEventListener("canplay", () => {

    ready = true;

    video.pause();

    console.log("VIDEO READY");

});



/* =========================
   SCROLL
========================= */

window.addEventListener("wheel", (e) => {

    if(!ready) return;

    e.preventDefault();

    targetTime += e.deltaY * 0.002;



    /* LIMITES */

    if(targetTime < 0){
        targetTime = 0;
    }

    if(targetTime > video.duration){
        targetTime = video.duration;
    }



    /* SEEK DIRECTO */

    video.currentTime = targetTime;

});



/* =========================
   MOUSE LOOK
========================= */

window.addEventListener("mousemove", (e) => {

    const percent = e.clientX / window.innerWidth;

    targetLookX = (percent - 0.5) * MAX_LOOK;

});



/* =========================
   LOOP VISUAL
========================= */

function loop(){

    requestAnimationFrame(loop);



    currentLookX +=
        (targetLookX - currentLookX) * 0.08;



    video.style.transform =
        `translateX(${currentLookX}px) scale(1.05)`;

}

loop();

</script>
</body>
</html>
