<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exploración Virtual</title>

<style>

html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial, sans-serif;
}

#container{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:black;
}

video{

    position:absolute;

    width:120vw;
    height:100vh;

    top:0;
    left:-10vw;

    object-fit:cover;

    transform-origin:center center;

    will-change:transform;

    pointer-events:none;

}

#hud{

    position:fixed;

    top:20px;
    left:20px;

    color:white;

    background:rgba(0,0,0,0.5);

    padding:12px;

    border-radius:12px;

    z-index:1000;

    backdrop-filter:blur(10px);

    line-height:1.5;

}

</style>
</head>
<body>

<div id="container">

    <video
        id="video"
        src="explorar.m4v"
        preload="auto"
        muted
        playsinline
    ></video>

</div>

<div id="hud">
    Scroll = avanzar / retroceder<br>
    Mouse = mirar lados
</div>

<script>

const video = document.getElementById("video");



/* =========================
   ESTADO
========================= */

let targetTime = 0;
let currentTime = 0;

let targetLookX = 0;
let currentLookX = 0;



/* =========================
   CONFIG
========================= */

const MAX_LOOK = 160;

/* CUÁNTO AVANZA POR SCROLL */

const SCROLL_SPEED = 0.0015;

/* SUAVIDAD TEMPORAL */

const TIME_LERP = 0.18;

/* SUAVIDAD MIRADA */

const LOOK_LERP = 0.08;

/* FPS DE SEEK */

const SEEK_INTERVAL = 1000 / 20; // 20 seeks por segundo



/* =========================
   READY
========================= */

let ready = false;

video.addEventListener("canplay", () => {

    ready = true;

    video.pause();

    console.log("VIDEO READY");

});



/* =========================
   SCROLL
========================= */

window.addEventListener("wheel", (e) => {

    if(!ready) return;

    e.preventDefault();

    targetTime += e.deltaY * SCROLL_SPEED;



    /* LIMITES */

    if(targetTime < 0){

        targetTime = 0;

    }

    if(targetTime > video.duration){

        targetTime = video.duration;

    }

}, { passive:false });



/* =========================
   MOUSE LOOK
========================= */

window.addEventListener("mousemove", (e) => {

    const percent = e.clientX / window.innerWidth;

    targetLookX = (percent - 0.5) * MAX_LOOK;

});



/* =========================
   SEEK CONTROLADO
========================= */

setInterval(() => {

    if(!ready) return;



    /* INTERPOLAR TIEMPO */

    currentTime +=
        (targetTime - currentTime) * TIME_LERP;



    /* SEEK */

    video.currentTime = currentTime;

}, SEEK_INTERVAL);




/* =========================
   LOOP VISUAL
========================= */

function animate(){

    requestAnimationFrame(animate);



    /* SUAVIZAR MIRADA */

    currentLookX +=
        (targetLookX - currentLookX) * LOOK_LERP;



    /* TRANSFORM */

    video.style.transform = `
        translateX(${currentLookX}px)
        scale(1.05)
    `;

}

animate();

</script>

</body>
</html>
